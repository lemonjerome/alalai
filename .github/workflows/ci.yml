name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        # Key module targets: availability-utils 100%, notification-service >80%, Zod schemas 100%
        # Global threshold kept low because API routes and RSC pages require live DB mocks.
        run: npm run test:coverage -- --coverageThreshold='{"global":{"lines":7}}'
        env:
          # Tests use mocks — stubs provided for env var validation
          MONGODB_URI: mongodb://localhost:27017/alalai_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
