version: '3.9'

# ── Local development stack ────────────────────────────────────────────────────
#
# SETUP (first time):
#   cp .docker.env.example .docker.env
#   # fill in your real credentials in .docker.env
#   docker compose up -d
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f app    # tail app logs
#   docker compose down -v        # stop and wipe volumes
#
# .docker.env is gitignored — never commit real credentials.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── MongoDB (local fallback — skip if using Atlas) ─────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: alalai
      MONGO_INITDB_ROOT_PASSWORD: alalai_dev
      MONGO_INITDB_DATABASE: alalai_local
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
    # Secrets come from .docker.env (gitignored). See .docker.env.example.
    env_file:
      - path: .docker.env
        required: true
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
      # Rate limiting: set to 'true' if you don't have an Upstash Redis endpoint
      DISABLE_RATE_LIMIT: 'true'

volumes:
  mongo_data:
  redis_data:
